name: Python Tech News Monitor

on:
  schedule:
    # 毎日 00:00 UTC (日本時間 09:00 JST) と 12:00 UTC (日本時間 21:00 JST) に実行
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PYTHONPATH=./src python src/main.py

      # (Optional) 実行履歴 `notified_articles.json` をコミット・Pushしておくことで、
      # 次回のAction実行時にも既読履歴が引き継がれます。
      - name: Commit history file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add notified_articles.json
          # 変更がある場合のみコミット
          git commit -m "Update notified articles history" || echo "No changes to commit"
          git push
